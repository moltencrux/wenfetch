<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}文章推薦{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding-top: 60px; }
    .score-badge { font-family: monospace; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
    <div class="container">
      <a class="navbar-brand" href="{% url 'recommend' %}">文章推薦</a>
      <div class="navbar-nav ms-auto">
        {% if user.is_authenticated %}
          <a class="nav-link" href="{% url 'vocab_list_index' %}">我的詞彙</a>
          <a class="nav-link" href="{% url 'recommend' %}">推薦文章</a>
          <a class="nav-link" href="{% url 'logout' %}">登出 ({{ user.username }})</a>
        {% else %}
          <a class="nav-link" href="{% url 'login' %}">登入</a>
          <a class="nav-link" href="{% url 'register' %}">註冊</a>
        {% endif %}
      </div>
    </div>
  </nav>
  <div class="container">
    {% for message in messages %}
      <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible mt-2">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
