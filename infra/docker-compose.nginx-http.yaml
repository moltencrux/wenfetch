# docker-compose.nginx-http.yml  — plain HTTP, no SSL, for testing only
services:
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:8080"
    configs:
      - source: nginx_http_config
        target: /etc/nginx/conf.d/default.conf
    depends_on:
      - web

configs:
  nginx_http_config:
    content: |
      server {
        listen 8080;
        server_name ${SERVER_HOSTNAME:-localhost};

        location /static/ {
          alias /static/;
        }

        location / {
          proxy_pass http://web:8000;
          proxy_set_header Host $$http_host;
          proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
          proxy_redirect off;
        }
      }
