# nginx overlay — use when you manage SSL certificates yourself
# (e.g. via certbot on the host, with certs mounted into the container).
# For plain HTTP only (no SSL), set SSL_CERT and SSL_KEY to empty.

services:
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:8080"
      - "${HTTPS_PORT:-8443}:8443"
    volumes:
      - ../staticfiles:/static:ro
      - ${SSL_CERT:-/dev/null}:/etc/ssl/certs/server.crt:ro
      - ${SSL_KEY:-/dev/null}:/etc/ssl/private/server.key:ro
    configs:
      - source: nginx_config
        target: /etc/nginx/conf.d/default.conf
    depends_on:
      - web

configs:
  nginx_config:
    content: |
      server {
        listen 8080;
        server_name ${SERVER_HOSTNAME:-localhost};
        return 301 https://$$host:${HTTPS_PORT:-8443}$$request_uri;
      }

      server {
        listen 8443 ssl;
        server_name ${SERVER_HOSTNAME:-localhost};

        ssl_certificate     /etc/ssl/certs/server.crt;
        ssl_certificate_key /etc/ssl/private/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;

        location /static/ {
          alias /static/;
        }

        location / {
          proxy_pass http://web:8000;
          proxy_set_header Host $$http_host;
          proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto https;
          proxy_redirect off;
        }
      }
