{% extends "base.html" %}
{% block title %}我的詞彙表{% endblock %}
{% block content %}
<div class="row mt-4">
  <div class="col-md-8">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4>我的詞彙表</h4>
      <a href="{% url 'vocab_list_create' %}" class="btn btn-primary btn-sm">+ 新增詞彙表</a>
    </div>
    {% if vocab_lists %}
      <div class="list-group">
        {% for vl in vocab_lists %}
          <a href="{% url 'vocab_list_detail' vl.pk %}"
             class="list-group-item list-group-item-action d-flex justify-content-between">
            <span>{{ vl.name }}</span>
            <small class="text-muted">{{ vl.entries.count }} 個詞</small>
          </a>
        {% endfor %}
      </div>
    {% else %}
      <p class="text-muted">還沒有詞彙表。<a href="{% url 'vocab_list_create' %}">建立第一個</a>。</p>
    {% endif %}
  </div>
</div>
{% endblock %}
