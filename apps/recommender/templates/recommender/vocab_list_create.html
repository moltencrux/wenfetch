{% extends "base.html" %}
{% block title %}新增詞彙表{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-5">
    <h4 class="mb-3">新增詞彙表</h4>
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">名稱</label>
        <input type="text" name="name" class="form-control"
               placeholder="例如：HSK4、個人詞彙" autofocus required>
      </div>
      <button type="submit" class="btn btn-primary">建立</button>
      <a href="{% url 'vocab_list_index' %}" class="btn btn-link">取消</a>
    </form>
  </div>
</div>
{% endblock %}
